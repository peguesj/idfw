name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  LINEAR_PROJECT_ID: 4d649a6501f7
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '18'

jobs:
  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install black isort flake8 mypy

    - name: Run Black
      run: black --check unified_framework/

    - name: Run isort
      run: isort --check-only unified_framework/

    - name: Run Flake8
      run: flake8 unified_framework/

    - name: Run MyPy
      run: mypy unified_framework/

  test-python:
    name: Test Python Code
    runs-on: ubuntu-latest
    needs: lint
    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-asyncio pytest-cov

    - name: Run unit tests
      run: |
        pytest unified_framework/tests/unit/ -v --cov=unified_framework --cov-report=xml

    - name: Run integration tests
      run: |
        pytest unified_framework/tests/integration/ -v

    - name: Upload coverage reports
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella

  test-node:
    name: Test Node Code
    runs-on: ubuntu-latest
    needs: lint
    steps:
    - uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: ${{ env.NODE_VERSION }}

    - name: Install dependencies
      run: npm ci

    - name: Run tests
      run: npm test

    - name: Run ESLint
      run: npm run lint

  schema-validation:
    name: Validate Schemas
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install jsonschema
      run: pip install jsonschema pyyaml

    - name: Validate IDFW schemas
      run: |
        python -c "
        import json
        import jsonschema
        from pathlib import Path

        for schema_file in Path('unified_framework/schemas').glob('**/*.json'):
            with open(schema_file) as f:
                schema = json.load(f)
                jsonschema.Draft202012Validator.check_schema(schema)
                print(f'✓ Valid: {schema_file}')
        "

  build:
    name: Build Project
    runs-on: ubuntu-latest
    needs: [test-python, test-node, schema-validation]
    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: ${{ env.NODE_VERSION }}

    - name: Build Python package
      run: |
        python -m pip install --upgrade pip setuptools wheel
        python setup.py sdist bdist_wheel

    - name: Build TypeScript
      run: |
        npm ci
        npm run build

    - name: Archive build artifacts
      uses: actions/upload-artifact@v3
      with:
        name: dist
        path: |
          dist/
          build/

  update-linear:
    name: Update Linear Issue
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: build
    steps:
    - name: Extract Linear Issue ID
      id: extract_issue
      run: |
        echo "Extracting Linear issue from PR description"
        # This would extract PEG-XXX from PR description
        echo "issue_id=PEG-XXX" >> $GITHUB_OUTPUT

    - name: Update Linear Status
      run: |
        echo "Would update Linear issue ${{ steps.extract_issue.outputs.issue_id }} to 'In Review'"
        echo "Linear Project: IDFWU (4d649a6501f7)"
        # Actual Linear API call would go here

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'

    - name: Upload Trivy results to GitHub Security tab
      uses: github/codeql-action/upload-sarif@v2
      with:
        sarif_file: 'trivy-results.sarif'

  notify-success:
    name: Notify Success
    runs-on: ubuntu-latest
    needs: [build, update-linear]
    if: success()
    steps:
    - name: Success Notification
      run: |
        echo "✅ CI Pipeline passed successfully!"
        echo "Linear Project: IDFWU (4d649a6501f7)"
        # Add actual notification logic (Slack, Discord, etc.)

  notify-failure:
    name: Notify Failure
    runs-on: ubuntu-latest
    needs: [build]
    if: failure()
    steps:
    - name: Failure Notification
      run: |
        echo "❌ CI Pipeline failed!"
        echo "Check the logs for details"
        echo "Linear Project: IDFWU (4d649a6501f7)"
        # Add actual notification logic